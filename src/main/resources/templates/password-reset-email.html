<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #f4f4f4;">
<table>
    <tr>
        <td style="padding: 40px 0;">
            <table  style="background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
                <tr>
                    <td style="background-color: #4CAF50; padding: 30px; text-align: center; color: #ffffff;">
                        <h1 style="margin: 0; font-size: 26px; font-weight: 600;">Reset Your Password</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 40px 30px; text-align: center; color: #333333;">
                        <p style="margin: 0; font-size: 16px; line-height: 1.6; color: #555555;">
                            To reset your password, please use the 6-digit verification code below:
                        </p>

                        <div style="margin: 35px 0; padding: 20px; background-color: #f9f9f9; border: 2px dashed #4CAF50; border-radius: 8px;">
                            <span th:text="${verification_code}" style="font-size: 36px; font-weight: 800; letter-spacing: 8px; color: #4CAF50; font-family: monospace;">123456</span>
                        </div>

                        <p style="margin: 0; font-size: 14px; color: #888888; line-height: 1.4;">
                            This code is valid for <strong>15 minutes</strong>. <br>
                            If you did not issue password reset, please ignore this email.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 25px; text-align: center; background-color: #fcfcfc; border-top: 1px solid #eeeeee; color: #aaaaaa; font-size: 12px;">
                        &copy; 2026 FoodBudget. All rights reserved.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
